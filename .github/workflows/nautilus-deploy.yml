# Generated by nautilus-cli init-ci
# Strategy: push source to EC2, build EIF there, run enclave.
# EC2 setup (Docker, nitro-cli) is handled automatically on first run.
name: Deploy Enclave

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Copy source to EC2 (exclude .git to avoid permission issues) ────
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEE_EC2_HOST }}
          username: ${{ secrets.TEE_EC2_USER }}
          key: ${{ secrets.TEE_EC2_SSH_KEY }}
          source: "Containerfile,src,Cargo.toml,Cargo.lock,Makefile,.gitignore"
          target: "~/nautilus-app/"
          overwrite: true
          rm: false

      # ── Setup EC2 + build + deploy (all on EC2) ──────────────────────
      - name: Setup, Build and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEE_EC2_HOST }}
          username: ${{ secrets.TEE_EC2_USER }}
          key: ${{ secrets.TEE_EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # ── Install Docker if missing ─────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "=== Installing Docker ==="
              sudo yum update -y
              # Try amazon-linux-extras first (AL2), fall back to yum (AL2023)
              sudo amazon-linux-extras install docker -y 2>/dev/null || \
                sudo yum install -y docker 2>/dev/null || \
                (curl -fsSL https://get.docker.com | sudo sh)
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
              echo "Docker installed."
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # ── Install nitro-cli if missing ──────────────────────────
            if ! command -v nitro-cli &> /dev/null; then
              echo "=== Installing nitro-cli ==="
              # Try amazon-linux-extras first (AL2), fall back to yum (AL2023)
              sudo amazon-linux-extras install aws-nitro-enclaves-cli -y 2>/dev/null || \
                sudo yum install -y aws-nitro-enclaves-cli 2>/dev/null || \
                (echo "nitro-cli not available via package manager" && exit 1)
              sudo yum install -y aws-nitro-enclaves-cli-devel 2>/dev/null || true
              sudo usermod -aG ne $USER 2>/dev/null || true
              echo "nitro-cli installed."
            else
              echo "nitro-cli already installed: $(nitro-cli --version)"
            fi

            # ── Configure enclave allocator if not already set ────────
            ALLOC=/etc/nitro_enclaves/allocator.yaml
            if ! grep -q "memory_mib: 4096" "$ALLOC" 2>/dev/null; then
              echo "=== Configuring enclave allocator ==="
              sudo sed -i "s/memory_mib:.*/memory_mib: 4096/" "$ALLOC" || true
              sudo sed -i "s/cpu_count:.*/cpu_count: 2/" "$ALLOC" || true
              sudo systemctl restart nitro-enclaves-allocator.service || true
              sudo systemctl enable nitro-enclaves-allocator.service || true
            fi

            # ── Install socat + jq if missing ─────────────────────────
            command -v socat &> /dev/null || sudo yum install -y socat
            command -v jq    &> /dev/null || sudo yum install -y jq

            # ── Build the EIF on EC2 ──────────────────────────────────
            # The Containerfile uses eif_build internally — the EIF is extracted
            # via --output, NOT via nitro-cli build-enclave.
            echo "=== Building Enclave Image ==="
            cd ~/nautilus-app
            mkdir -p out

            sudo docker build \
              --platform linux/amd64 \
              --progress=plain \
              --output type=local,dest=out/ \
              -f Containerfile \
              . 2>&1 | tee out/docker.log

            echo "=== EIF built ==="
            ls -lh out/
            echo "=== PCR Measurements ==="
            cat out/nitro.pcrs || true

            # ── Terminate old enclave and start new one ───────────────
            echo "=== Terminating existing enclaves ==="
            sudo nitro-cli terminate-enclave --all || true

            echo "=== Starting new enclave ==="
            sudo nitro-cli run-enclave \
              --cpu-count 2 \
              --memory 4096 \
              --eif-path ~/nautilus-app/out/nitro.eif

            echo "=== Running enclaves ==="
            sudo nitro-cli describe-enclaves

            # ── Start VSOCK bridge (restart if already running) ───────
            echo "=== Starting VSOCK bridge ==="
            sudo pkill -f "socat.*4000" 2>/dev/null || true
            sleep 1

            ENCLAVE_CID=$(sudo nitro-cli describe-enclaves | jq -r '.[0].EnclaveCID')
            touch /tmp/enclave.log

            # Write systemd service files using printf (heredocs break YAML)
            printf '[Unit]\nDescription=Nautilus VSOCK Bridge\nAfter=network.target\n\n[Service]\nExecStart=/usr/bin/socat TCP-LISTEN:4000,reuseaddr,fork VSOCK-CONNECT:%s:4000\nRestart=always\nRestartSec=2\n\n[Install]\nWantedBy=multi-user.target\n' "$ENCLAVE_CID" | sudo tee /etc/systemd/system/nautilus-bridge.service > /dev/null

            printf '[Unit]\nDescription=Nautilus Log Collector\nAfter=network.target\n\n[Service]\nExecStart=/usr/bin/socat VSOCK-LISTEN:5000,fork,reuseaddr OPEN:/tmp/enclave.log,creat,append\nRestart=always\nRestartSec=2\n\n[Install]\nWantedBy=multi-user.target\n' | sudo tee /etc/systemd/system/nautilus-logs.service > /dev/null

            sudo systemctl daemon-reload
            sudo systemctl restart nautilus-bridge.service
            sudo systemctl restart nautilus-logs.service
            sudo systemctl enable nautilus-bridge.service nautilus-logs.service

            echo ""
            echo "Deployment complete."
            echo "  Enclave CID: $ENCLAVE_CID"
            sudo systemctl status nautilus-bridge.service --no-pager || true
